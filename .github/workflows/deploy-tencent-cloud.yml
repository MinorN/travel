name: Deploy To Tencent Cloud

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy
        required: true
        default: main

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_BRANCH: ${{ github.event.inputs.branch || 'main' }}
    steps:
      - name: Validate required secrets
        env:
          TENCENT_HOST: ${{ secrets.TENCENT_HOST }}
          TENCENT_USER: ${{ secrets.TENCENT_USER }}
          TENCENT_DEPLOY_PATH: ${{ secrets.TENCENT_DEPLOY_PATH }}
          TENCENT_REPO_URL: ${{ secrets.TENCENT_REPO_URL }}
          TENCENT_SSH_KEY: ${{ secrets.TENCENT_SSH_KEY }}
          TENCENT_SSH_PASSWORD: ${{ secrets.TENCENT_SSH_PASSWORD }}
        run: |
          set -euo pipefail

          if [[ -z "${TENCENT_HOST}" ]]; then
            echo "Missing secret: TENCENT_HOST"
            exit 1
          fi

          if [[ -z "${TENCENT_USER}" ]]; then
            echo "Missing secret: TENCENT_USER"
            exit 1
          fi

          if [[ -z "${TENCENT_DEPLOY_PATH}" ]]; then
            echo "Missing secret: TENCENT_DEPLOY_PATH"
            exit 1
          fi

          if [[ "${TENCENT_DEPLOY_PATH}" == git@* || "${TENCENT_DEPLOY_PATH}" == http://* || "${TENCENT_DEPLOY_PATH}" == https://* ]]; then
            echo "TENCENT_DEPLOY_PATH must be a server directory path, not a repository URL"
            echo "Example: /home/ubuntu/travel"
            exit 1
          fi

          if [[ -z "${TENCENT_SSH_KEY}" && -z "${TENCENT_SSH_PASSWORD}" ]]; then
            echo "Missing authentication secret: set TENCENT_SSH_KEY or TENCENT_SSH_PASSWORD"
            exit 1
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.TENCENT_HOST }}
          username: ${{ secrets.TENCENT_USER }}
          key: ${{ secrets.TENCENT_SSH_KEY }}
          password: ${{ secrets.TENCENT_SSH_PASSWORD }}
          port: ${{ secrets.TENCENT_PORT || '22' }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail

            DEPLOY_PATH="${{ secrets.TENCENT_DEPLOY_PATH }}"
            REPO_URL="${{ secrets.TENCENT_REPO_URL }}"
            BRANCH="${{ github.event.inputs.branch || 'main' }}"

            if [[ -z "$DEPLOY_PATH" ]]; then
              echo "TENCENT_DEPLOY_PATH is empty"
              exit 1
            fi

            mkdir -p "$DEPLOY_PATH"

            if [[ ! -d "$DEPLOY_PATH/.git" ]]; then
              if [[ -z "$REPO_URL" ]]; then
                echo "Path is not a git repository and TENCENT_REPO_URL is empty"
                exit 1
              fi

              if [[ -n "$(ls -A "$DEPLOY_PATH" 2>/dev/null)" ]]; then
                echo "Path exists but is not a git repository: $DEPLOY_PATH"
                echo "Please clean the directory or set TENCENT_DEPLOY_PATH to an empty path"
                exit 1
              fi

              echo "== Bootstrap repository =="
              git clone --branch "$BRANCH" "$REPO_URL" "$DEPLOY_PATH"
            fi

            cd "$DEPLOY_PATH"

            echo "== Sync code =="
            TARGET_BRANCH="$BRANCH"
            if ! git ls-remote --exit-code --heads origin "$TARGET_BRANCH" >/dev/null 2>&1; then
              TARGET_BRANCH="$(git symbolic-ref --short refs/remotes/origin/HEAD 2>/dev/null | sed 's@^origin/@@')"
            fi

            if [[ -z "$TARGET_BRANCH" ]]; then
              echo "Cannot determine target branch. Set workflow input branch explicitly."
              exit 1
            fi

            git fetch origin "$TARGET_BRANCH"
            git checkout -B "$TARGET_BRANCH" "origin/$TARGET_BRANCH"
            git pull --ff-only origin "$TARGET_BRANCH"

            echo "== Deploy containers =="
            if command -v sudo >/dev/null 2>&1; then
              sudo bash docker/deploy.sh
            else
              bash docker/deploy.sh
            fi

            echo "== Health check =="
            if command -v sudo >/dev/null 2>&1; then
              sudo bash docker/check.sh
            else
              bash docker/check.sh
            fi
