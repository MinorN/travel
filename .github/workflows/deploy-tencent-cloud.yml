name: Deploy To Tencent Cloud

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy
        required: true
        default: main

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_BRANCH: ${{ github.event.inputs.branch || 'main' }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.TENCENT_HOST }}
          username: ${{ secrets.TENCENT_USER }}
          key: ${{ secrets.TENCENT_SSH_KEY }}
          port: ${{ secrets.TENCENT_PORT || '22' }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail

            DEPLOY_PATH="${{ secrets.TENCENT_DEPLOY_PATH }}"
            BRANCH="${DEPLOY_BRANCH}"

            if [[ -z "$DEPLOY_PATH" ]]; then
              echo "TENCENT_DEPLOY_PATH is empty"
              exit 1
            fi

            cd "$DEPLOY_PATH"

            echo "== Sync code =="
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git pull --ff-only origin "$BRANCH"

            echo "== Deploy containers =="
            bash docker/deploy.sh

            echo "== Health check =="
            bash docker/check.sh
